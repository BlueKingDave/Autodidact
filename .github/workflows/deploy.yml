name: Deploy

on:
  push:
    branches: [master]

env:
  GCP_REGION: us-central1
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/autodidact

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/api:latest
          cache-to: type=inline

      - name: Build and push Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/agent:${{ github.sha }}
            ${{ env.REGISTRY }}/agent:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/agent:latest
          cache-to: type=inline

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/worker:latest
          cache-to: type=inline

  run-migrations:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @autodidact/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-services:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: run-migrations
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy API
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: autodidact-api
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          region: ${{ env.GCP_REGION }}

      - name: Deploy Agent
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: autodidact-agent
          image: ${{ env.REGISTRY }}/agent:${{ github.sha }}
          region: ${{ env.GCP_REGION }}

      - name: Deploy Worker
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: autodidact-worker
          image: ${{ env.REGISTRY }}/worker:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
